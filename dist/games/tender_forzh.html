// SHOW RECORDS MODAL
function showRecordsModal(filterOrg = null) {
  const oldModal = document.getElementById('recordsModal');
  if(oldModal && oldModal.parentNode) oldModal.parentNode.removeChild(oldModal);
  
  let records = JSON.parse(localStorage.getItem('tf_lb') || '[]');
  if (filterOrg) {
    records = records.filter(r => r.org === filterOrg);
  }
  records.sort((a, b) => b.score - a.score);
  const top = records.slice(0, 10);
  
  const modal = document.createElement('div');
  modal.id = 'recordsModal';
  modal.setAttribute('tabindex', '-1');
  modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;justify-content:center;align-items:center;z-index:9999;font-family:"Russo One","Roboto",sans-serif;outline:none;';
  
  const modalContent = document.createElement('div');
  modalContent.style.cssText = 'background:linear-gradient(135deg, rgba(5,10,35,0.98), rgba(26,58,138,0.9));border:3px solid #1a3a8a;border-radius:20px;padding:30px;max-width:600px;width:90%;color:#fff;box-shadow:0 0 50px #1a3a8a;max-height:80vh;overflow-y:auto;';
  
  let recordsHTML = '';
  if(top.length === 0) {
    recordsHTML = '<p style="text-align:center;color:#aaa;font-size:18px;">Пока нет записей</p>';
  } else {
    recordsHTML = top.map((r,i) => {
      const color = i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':'#fff';
      const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'🏅';
      return '<div style="display:flex;justify-content:space-between;align-items:center;padding:15px;margin:10px 0;background:rgba(255,255,255,0.1);border-radius:10px;border-left:4px solid '+color+'"><span style="color:'+color+';font-size:20px;">'+medal+' '+(r.org || '-')+'</span><span style="color:#00ff88;font-size:24px;font-family:Orbitron;">'+r.score.toLocaleString()+'</span><span style="color:#aaa;font-size:14px;">'+r.date+'</span></div>';
    }).join('');
  }
  
  modalContent.innerHTML = '<h2 style="text-align:center;color:#ffd700;margin:0 0 20px 0;font-size:32px;text-shadow:0 0 20px #ffd700;">🏆 РЕКОРДЫ'+(filterOrg ? ' — '+filterOrg : '')+'</h2>'+recordsHTML+'<div style="text-align:center;margin-top:30px;"><button id="closeRecordsBtn" style="background:linear-gradient(135deg, #1a3a8a, #2a5aee);color:#fff;border:none;padding:15px 40px;border-radius:10px;cursor:pointer;font-weight:bold;font-size:18px;font-family:\'Russo One\',sans-serif;box-shadow:0 5px 20px rgba(26,58,138,0.5);transition:all 0.3s;">✕ Закрыть</button></div>';
  
  modal.appendChild(modalContent);
  document.body.appendChild(modal);
  
  function closeModal() {
    if(modal.parentNode) {
      document.removeEventListener('keydown', modalKeyHandler, true);
      window.removeEventListener('keydown', modalKeyHandler, true);
      modal.parentNode.removeChild(modal);
    }
  }
  
  const closeBtn = document.getElementById('closeRecordsBtn');
  if(closeBtn) {
    closeBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      closeModal();
    });
  }
  
  modal.addEventListener('click', function(e) {
    if(e.target === modal) closeModal();
  });
  
  function modalKeyHandler(e) {
    if(e.key === 'Escape' || e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      e.stopPropagation();
      closeModal();
      return false;
    }
  }
  
  document.addEventListener('keydown', modalKeyHandler, true);
  window.addEventListener('keydown', modalKeyHandler, true);
  
  setTimeout(() => { 
    modal.focus(); 
  }, 50);
}

function s(v){return v*canvas.width/W;}

function drawRoundRect(x,y,w,h,r,fill,stroke){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=s(2);ctx.stroke();}
}

function drawPlayerCar(cx,cy){
  const x=s(cx-20), y=s(cy-30), sc=s(1);
  ctx.save();ctx.globalAlpha=0.3;
  drawRoundRect(x+sc*2,y+sc*2,sc*40,sc*60,sc*6,'#000');
  ctx.restore();
  drawRoundRect(x,y,sc*40,sc*60,sc*8,'#1a3a8a','#2a5aee');
  drawRoundRect(x+sc*5,y+sc*5,sc*30,sc*18,sc*4,'rgba(150,200,255,0.7)','#4488ff');
  drawRoundRect(x+sc*5,y+sc*37,sc*30,sc*14,sc*4,'rgba(100,150,200,0.5)','#3366cc');
  drawRoundRect(x+sc*8,y+sc*14,sc*24,sc*26,sc*4,'#0f2060');
  [[0,8],[32,8],[0,44],[32,44]].forEach(([wx,wy])=>{
    ctx.beginPath();ctx.arc(x+sc*wx+sc*4,y+sc*wy+sc*4,sc*5,0,Math.PI*2);
    ctx.fillStyle='#111';ctx.fill();
    ctx.beginPath();ctx.arc(x+sc*wx+sc*4,y+sc*wy+sc*4,sc*3,0,Math.PI*2);
    ctx.fillStyle='#444';ctx.fill();
  });
  ctx.fillStyle='#ffffaa';
  ctx.fillRect(x+sc*5,y+sc*2,sc*10,sc*5);
  ctx.fillRect(x+sc*25,y+sc*2,sc*10,sc*5);
  ctx.fillStyle='#ff2200';
  ctx.fillRect(x+sc*5,y+sc*53,sc*10,sc*5);
  ctx.fillRect(x+sc*25,y+sc*53,sc*10,sc*5);
  drawRoundRect(x+sc*10,y+sc*55,sc*20,sc*8,sc*2,'#fff');
  ctx.fillStyle='#000';ctx.font='bold '+s(5)+'px Roboto';ctx.textAlign='center';
  ctx.fillText('ГОС001',x+sc*20,y+sc*62);
  if(Math.random()>0.5){
    state.particles.push({x:cx-5+Math.random()*10,y:cy+32,vx:(Math.random()-0.5),vy:1+Math.random(),life:0.8,color:'rgba(180,180,180,0.5)',r:3+Math.random()*3});
  }
}

function drawAICar(cx,cy,glitch=false){
  const x=s(cx-20), y=s(cy-30), sc=s(1);
  ctx.save();ctx.globalAlpha=0.2;
  ctx.shadowBlur=s(20);ctx.shadowColor='#00ffff';
  drawRoundRect(x-sc*3,y-sc*3,sc*46,sc*66,sc*10,'#00ffff');
  ctx.restore();
  const bodyColor=glitch?'#ff2244':'#e8e8f0';
  drawRoundRect(x,y,sc*40,sc*60,sc*6,bodyColor,'#00ddff');
  ctx.strokeStyle='#00ffff';ctx.lineWidth=s(2);
  ctx.beginPath();ctx.moveTo(x+sc*5,y+sc*20);ctx.lineTo(x+sc*35,y+sc*20);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+sc*5,y+sc*40);ctx.lineTo(x+sc*35,y+sc*40);ctx.stroke();
  drawRoundRect(x+sc*5,y+sc*5,sc*30,sc*18,sc*4,'rgba(0,200,255,0.4)','#00ccff');
  drawRoundRect(x+sc*8,y+sc*14,sc*24,sc*22,sc*3,'#001122');
  ctx.fillStyle='#00ffff';ctx.font='bold '+s(6)+'px Orbitron';ctx.textAlign='center';
  ctx.fillText('AI-44',x+sc*20,y+sc*28);
  [[0,8],[32,8],[0,44],[32,44]].forEach(([wx,wy])=>{
    ctx.beginPath();ctx.arc(x+sc*wx+sc*4,y+sc*wy+sc*4,sc*5,0,Math.PI*2);
    ctx.fillStyle='#112233';ctx.fill();
    ctx.beginPath();ctx.arc(x+sc*wx+sc*4,y+sc*wy+sc*4,sc*3,0,Math.PI*2);
    ctx.fillStyle='#00aacc';ctx.fill();
  });
  ctx.fillStyle='rgba(0,255,255,'+(0.7+Math.sin(Date.now()/200)*0.3)+')';
  ctx.fillRect(x+sc*5,y+sc*2,sc*10,sc*4);
  ctx.fillRect(x+sc*25,y+sc*2,sc*10,sc*4);
  if(Math.random()>0.6){
    state.particles.push({x:cx+Math.random()*10-5,y:cy+32,vx:(Math.random()-0.5)*2,vy:1+Math.random(),life:0.5,color:'#00ffff',r:2});
  }
  if(glitch){
    ctx.save();ctx.globalAlpha=0.4;
    ctx.fillStyle='#ff0044';
    ctx.fillRect(x+Math.random()*10,y+Math.random()*10,sc*40,sc*5);
    ctx.fillStyle='#00ffff';
    ctx.fillRect(x+Math.random()*10,y+sc*30+Math.random()*10,sc*40,sc*3);
    ctx.restore();
  }
}

function drawObstacle(ob){
  ctx.save();
  if (ob.lane === 'ai') ctx.translate(s(566.666), 0);
  const x=s(ob.x-ob.tw/2), y=s(ob.y-ob.th/2), w=s(ob.tw), h=s(ob.th);
  const t=ob.type;
  if(t==='storm'){
    ctx.translate(s(ob.x),s(ob.y));
    ctx.rotate(ob.rot||0);
    ctx.translate(-s(ob.x),-s(ob.y));
  }
  if(t==='fas'){
    drawRoundRect(x,y,w,h,s(5),'#f5f5f5','#cc0000');
    ctx.fillStyle='#cc0000';ctx.fillRect(x,y,w,h*0.3);
    ctx.fillStyle='#fff';ctx.font='bold '+s(7)+'px Roboto';ctx.textAlign='center';
    ctx.fillText('ФАС',x+w/2,y+h*0.2);
    ctx.strokeStyle='#ccc';ctx.lineWidth=s(1);
    [0.45,0.6,0.75,0.88].forEach(p=>{ctx.beginPath();ctx.moveTo(x+w*0.1,y+h*p);ctx.lineTo(x+w*0.9,y+h*p);ctx.stroke();});
    ctx.beginPath();ctx.arc(x+w*0.75,y+h*0.7,s(10),0,Math.PI*2);
    ctx.strokeStyle='#cc0000';ctx.lineWidth=s(2);ctx.stroke();
    ctx.fillStyle='#cc000055';ctx.fill();
  } else if(t==='act'){
    drawRoundRect(x,y,w,h,s(4),'#d4a574','#8b6340');
    ctx.fillStyle='#c8956a';ctx.fillRect(x+s(2),y+h*0.1,w-s(4),h*0.85);
    drawRoundRect(x+w*0.3,y-s(5),w*0.4,s(12),s(4),'#888','#555');
    [[0.15,0.3],[0.15,0.5],[0.15,0.7]].forEach(([cx2,cy2])=>{
      ctx.strokeStyle='#333';ctx.lineWidth=s(1.5);
      ctx.strokeRect(x+w*cx2,y+h*cy2,s(10),s(10));
      if(Math.random()>0.5){ctx.beginPath();ctx.moveTo(x+w*cx2+s(2),y+h*cy2+s(5));ctx.lineTo(x+w*cx2+s(5),y+h*cy2+s(9));ctx.lineTo(x+w*cx2+s(10),y+h*cy2+s(1));ctx.stroke();}
    });
  } else if(t==='letter'){
    drawRoundRect(x,y,w,h,s(4),'#fff8ee','#0044aa');
    ctx.strokeStyle='#0044aa';ctx.lineWidth=s(1.5);
    ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+w/2,y+h*0.5);ctx.lineTo(x+w,y);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x,y+h);ctx.lineTo(x+w/2,y+h*0.5);ctx.lineTo(x+w,y+h);ctx.stroke();
    ctx.beginPath();ctx.arc(x+w/2,y+h/2,s(8),0,Math.PI*2);
    ctx.fillStyle='#aa2200';ctx.fill();
    ctx.fillStyle='#ff4400';ctx.font='bold '+s(8)+'px Roboto';ctx.textAlign='center';
    ctx.fillText('М',x+w/2,y+h/2+s(3));
  } else if(t==='brief'){
    drawRoundRect(x,y+h*0.15,w,h*0.85,s(5),'#8b6340','#5a3d20');
    drawRoundRect(x+w*0.2,y,w*0.6,h*0.25,s(4),'#6b4820','#5a3d20');
    ctx.strokeStyle='#ffd700';ctx.lineWidth=s(2);
    ctx.beginPath();ctx.moveTo(x+w/2-s(10),y+h*0.55);ctx.lineTo(x+w/2+s(10),y+h*0.55);ctx.stroke();
    ctx.fillStyle='#ffd700';ctx.font=s(16)+'px Roboto';ctx.textAlign='center';
    ctx.fillText('₽',x+w/2,y+h*0.75);
    ctx.font=s(14)+'px Roboto';ctx.fillText('⚠',x+w/2,y+h*0.35);
  } else if(t==='storm'){
    ctx.globalAlpha=0.9;
    for(let i=0;i<8;i++){
      const a=(ob.rot||0)+i*Math.PI/4, r=s(25);
      const px=s(ob.x)+Math.cos(a)*r, py=s(ob.y)+Math.sin(a)*r;
      ctx.save();ctx.translate(px,py);ctx.rotate(a+Math.PI/4);
      ctx.fillStyle='hsl('+(i*45)+',60%,80%)';
      ctx.fillRect(-s(6),-s(8),s(12),s(16));
      ctx.restore();
    }
    ctx.fillStyle='rgba(100,200,255,0.3)';
    ctx.beginPath();ctx.arc(s(ob.x),s(ob.y),s(25),0,Math.PI*2);ctx.fill();
  } else if(t==='reorg'){
    const nCabinets=Math.floor(ob.tw/50);
    for(let i=0;i<nCabinets;i++){
      const cx3=x+i*(w/nCabinets);
      drawRoundRect(cx3+s(2),y,w/nCabinets-s(4),h,s(3),'#7a8899','#556677');
      ctx.fillStyle='#889aaa';ctx.fillRect(cx3+s(4),y+h*0.15,w/nCabinets-s(8),h*0.25);
      ctx.fillStyle='#889aaa';ctx.fillRect(cx3+s(4),y+h*0.5,w/nCabinets-s(8),h*0.25);
      ctx.fillStyle='#aabbcc';ctx.fillRect(cx3+s(4)+w/(nCabinets*2)-s(4),y+h*0.25,s(8),s(4));
      ctx.fillStyle='#aabbcc';ctx.fillRect(cx3+s(4)+w/(nCabinets*2)-s(4),y+h*0.63,s(8),s(4));
    }
    if(ob.gapX!==undefined){
      ctx.clearRect(s(ob.gapX),y-s(2),s(60),h+s(4));
    }
  } else if(t==='sequestr'){
    drawRoundRect(x,y,w,h,s(4),'#e6005c','#aa0044');
    ctx.fillStyle='#fff';ctx.font='bold '+s(8)+'px Roboto';ctx.textAlign='center';
    ctx.fillText('₽',x+w/2,y+h*0.55);
    ctx.font=s(6)+'px Roboto';ctx.fillText('СЕКВЕСТР',x+w/2,y+h*0.8);
  } else if(t==='hole'){
    ctx.save();
    const grad = ctx.createRadialGradient(x+w/2, y+h/2, 0, x+w/2, y+h/2, w/2);
    grad.addColorStop(0, '#000');
    grad.addColorStop(0.7, '#1a0000');
    grad.addColorStop(1, '#330000');
    ctx.fillStyle = grad;
    ctx.fillRect(x, y, w, h);
    
    ctx.strokeStyle = '#ff4400';
    ctx.lineWidth = s(4);
    ctx.strokeRect(x, y, w, h);
    
    ctx.shadowBlur = s(20);
    ctx.shadowColor = '#ff0000';
    ctx.fillStyle = '#ffdd00';
    ctx.font = 'bold '+s(14)+'px Russo One';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = s(3);
    ctx.strokeText('ДЫРА В ОТЧЁТЕ', x+w/2, y+h/2);
    ctx.fillText('ДЫРА В ОТЧЁТЕ', x+w/2, y+h/2);
    
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#ff0000';
    ctx.lineWidth = s(2);
    ctx.strokeText('ДЫРА В ОТЧЁТЕ', x+w/2, y+h/2);
    
    ctx.restore();
  }
  ctx.restore();
}

function drawPowerup(p){
  const x=s(p.x), y=s(p.y);
  const t=Date.now()/1000;
  ctx.save();
  for(let i=0;i<8;i++){
    const a=t*2+i*Math.PI/4;
    ctx.beginPath();
    ctx.arc(x+Math.cos(a)*s(18),y+Math.sin(a)*s(18),s(3),0,Math.PI*2);
    ctx.fillStyle=p.color;ctx.globalAlpha=0.7;ctx.fill();
  }
  ctx.restore();
  ctx.save();ctx.shadowBlur=s(15);ctx.shadowColor=p.color;
  ctx.beginPath();ctx.arc(x,y,s(16),0,Math.PI*2);
  ctx.fillStyle=p.color+'44';ctx.fill();
  ctx.strokeStyle=p.color;ctx.lineWidth=s(2);ctx.stroke();
  ctx.restore();
  ctx.font=s(18)+'px Roboto';ctx.textAlign='center';
  ctx.fillText(p.icon,x,y+s(7));
}

function drawSpeechBubble(x, y, text, color='#ffffff', bgColor='rgba(5,10,40,0.95)', borderColor='#ffd700'){
  if(!text)return;
  ctx.font = 'bold '+s(15)+'px Russo One';
  const tw = ctx.measureText(text).width;
  const bw = tw + s(28), bh = s(36);
  const bx = Math.max(s(8), Math.min(s(x) - bw/2, s(1058)-bw));
  const by = s(y) - bh - s(22);
  ctx.save();
  ctx.shadowBlur=s(12); ctx.shadowColor=borderColor;
  drawRoundRect(bx, by, bw, bh, s(8), bgColor, borderColor);
  ctx.restore();
  ctx.beginPath();
  ctx.moveTo(s(x)-s(8), by+bh);
  ctx.lineTo(s(x)+s(8), by+bh);
  ctx.lineTo(s(x), by+bh+s(12));
  ctx.closePath();
  ctx.fillStyle=bgColor; ctx.fill();
  ctx.strokeStyle=borderColor; ctx.lineWidth=s(2); ctx.stroke();
  ctx.fillStyle=color;
  ctx.font='bold '+s(15)+'px Russo One';
  ctx.textAlign='center';
  ctx.shadowBlur=0;
  ctx.fillText(text, bx+bw/2, by+bh-s(10));
}

function spawnObstacle(){
  const types=OBSTACLE_TYPES;
  
  state.obstacleSeed++;
  
  const shouldSpawn = (state.obstacleSeed % 2 === 0) || (state.obstacleSeed % 3 === 0);
  
  if(shouldSpawn){
    const typeIndex = Math.floor(Math.random() * types.length);
    let t = types[typeIndex];
    
    if(Math.random() < 0.1) t = types.find(t=>t.id==='reorg');

    const posPick = Math.floor(Math.random() * 3);
    
    let x;
    if(posPick === 0) x = 100;
    else if(posPick === 1) x = 200;
    else x = 300;
    
    let gapX = undefined;
    
    if(t.id==='reorg'){
      x = 50;
      gapX = 80 + Math.random() * 150;
    }
    if(t.id==='sequestr'){
    }
    
    state.obstacles.push({
      type:t.id,
      tw:t.tw||t.w,
      th:t.th||t.h,
      x:x,
      y:-50,
      speed:state.speed + 1 + Math.random() * 2,
      lane:'player',
      rot:0,
      gapX:t.id==='reorg'?gapX:undefined,
      color:t.color,
      active:true,
      scored:false
    });
    
    state.obstacles.push({
      type:t.id,
      tw:t.tw||t.w,
      th:t.th||t.h,
      x:x,
      y:-50,
      speed:state.speed + 1 + Math.random() * 2,
      lane:'ai',
      rot:0,
      gapX:t.id==='reorg'?gapX:undefined,
      color:t.color,

      scored:false
    });
  }
}

function spawnPowerup(){
  const t=POWERUP_TYPES[Math.floor(Math.random()*POWERUP_TYPES.length)];
  
  const lane = Math.floor(Math.random() * 3);
  let x;
  if(lane === 0) x = 100;
  else if(lane === 1) x = 200;
  else x = 300;
  
  const puSpeed = (t.effect === 'deadline') ? (state.speed * 1.5 + 4) : 2;
  
  state.powerups.push({
    ...t,
    x:x,
    y:-20,
    speed:puSpeed,
    lane:'player'
  });
  
  state.powerups.push({
    ...t,
    x:x,
    y:-20,
    speed:puSpeed,
    lane:'ai'
  });
}

function updateAI(dt){
  const ai=state.ai;
  ai.modeTimer-=dt;
  if(ai.modeTimer<=0){
    const modes=['ОПТИМУМ','ГЛЮК','ЧИТЕР'];
    const dur=[15+Math.random()*10,8+Math.random()*7,5+Math.random()*5];
    ai.mode=modes[Math.floor(Math.random()*3)];
    ai.modeTimer=dur[modes.indexOf(ai.mode)];
  }

  const myObstacles=state.obstacles.filter(o=>o.lane==='ai'&&o.y>0&&o.y<H);
  const nearest=myObstacles.sort((a,b)=>a.y-b.y)[0];

  if(ai.mode==='ОПТИМУМ'){
    if(nearest){
      const mid=nearest.x+nearest.tw/2;
      ai.targetX=mid<150?200:50;
    } else {ai.targetX=120+Math.sin(Date.now()/1500)*60;}
    ai.x+=(ai.targetX-ai.x)*0.08;
    // БАЛАНСИРОВКА: одинаковая база начисления очков как у игрока
    const aiStreakMult = 1 + (ai.streak * 0.02);
    const aiBaseScore = state.speed * dt * 8;
    ai.score += aiBaseScore * aiStreakMult;
  } else if(ai.mode==='ГЛЮК'){
    ai.glitchTimer-=dt;
    if(ai.glitchTimer<=0){ai.glitchTimer=0.4+Math.random()*0.3;ai.targetX=20+Math.random()*260;}
    ai.x+=(ai.targetX-ai.x)*0.1;
    if(nearest&&Math.random()<0.02){
      const screenX = 616.66 + ai.x + 20;
      const screenY = ai.y - 30;
      spawnParticles(screenX, screenY, nearest.color, 8);
      spawnPopup(screenX, screenY - 40, 'СБОЙ!', '#ff4444');
      ai.score=Math.max(0,ai.score-20); // УМЕНЬШЕН ШТРАФ
    }
    // БАЛАНСИРОВКА: одинаковая база начисления очков как у игрока
    const aiStreakMult = 1 + (ai.streak * 0.02);
    const aiBaseScore = state.speed * dt * 8;
    ai.score += aiBaseScore * aiStreakMult;
  } else {
    if(nearest){
      const mid=nearest.x+nearest.tw/2;
      const dodge=mid<150?200:50;
      ai.targetX=dodge;
    } else {ai.targetX=120;}
    ai.x+=(ai.targetX-ai.x)*0.15;
    // БАЛАНСИРОВКА: одинаковая база начисления очков как у игрока
    const aiStreakMult = 1 + (ai.streak * 0.02);
    const aiBaseScore = state.speed * dt * 8;
    ai.score += aiBaseScore * aiStreakMult;
  }

  ai.x=Math.max(10,Math.min(ai.x,260));
  
  // Update AI powerup timer
  if(ai.activePowerup){
    ai.powerupTimer -= dt;
    if(ai.powerupTimer <= 0){
      ai.activePowerup = null;
    }
  }
  
  if(ai.invincible > 0) ai.invincible -= dt;
}

function checkCollisions(){
  const p=state.player;
  const px=p.x;
  const py=p.y;
  const pw=36;
  const ph=56;

  // Проверка столкновений игрока с препятствиями
  state.obstacles.filter(o=>o.lane==='player'&&o.active).forEach(o=>{
    const ox=o.x;
    const oy=o.y;
    const ow=o.tw/2;
    const oh=o.th/2;
    
    if(p.invincible>0)return;
    
    if(px+pw > ox-ow && px-pw < ox+ow && py+ph > oy-oh && py-ph < oy+oh){
      if(o.type==='reorg'&&o.gapX!==undefined){
        const playerRight = px + pw;
        const playerLeft = px - pw;
        const gapLeft = o.gapX;
        const gapRight = o.gapX + 60;
        if(playerLeft > gapLeft && playerRight < gapRight) return;
      }
      
      o.active=false;
      if(p.activePowerup==='shield'){
        p.activePowerup=null;
        spawnPopup(px+50,py-50,'🛡 ЗАЩИТА!','#ffff00');
        return;
      }
      spawnParticles(px+50,py,o.color||'#ff4444',12);
      state.shake=8;
      
      if(o.type==='fas'){
        p.speed=0.5;
        setTimeout(()=>{p.speed=1;},2000);
        spawnPopup(px+50,py-50,'ЗАМЕДЛЕНИЕ!','#ff8800');
      }
      else if(o.type==='act'){
        p.speed=0;
        setTimeout(()=>{p.speed=1;},1000);
        spawnPopup(px+50,py-50,'ПРОВЕРКА!','#ff4444');
      }
      else if(o.type==='brief'){
        p.y=Math.min(p.y+60,520);
        spawnPopup(px+50,py-50,'ОТКАТ!','#aa44ff');
      }
      else if(o.type==='storm'){
        state.invertControls=true;
        setTimeout(()=>{state.invertControls=false;},3000);
        spawnPopup(px+50,py-50,'ИНВЕРСИЯ!','#44ccff');
      }
      else if(o.type==='hole'){
        spawnPopup(px+50,py-50,'ДЫРА В ОТЧЁТЕ!','#ff0000');
        state.shake=12;
        p.speed=0.2; 
        setTimeout(()=>{p.speed=1;}, 2000);
      }
      p.streak=0;
      p.invincible=1.5;
      playHit();
    }
  });

  // Проверка столкновений алгоритма с препятствиями
  state.obstacles.filter(o=>o.lane==='ai'&&o.active).forEach(o=>{
    const ai=state.ai;
    const ax=ai.x;
    const ay=ai.y;
    const aw=36;
    const ah=56;
    const ox=o.x;
    const oy=o.y;
    const ow=o.tw/2;
    const oh=o.th/2;
    
    if(ai.invincible > 0) return;
    
    if(ax+aw > ox-ow && ax-aw < ox+ow && ay+ah > oy-oh && ay-ah < oy+oh){
      if(o.type==='reorg'&&o.gapX!==undefined){
        const aiRight = ax + aw;
        const aiLeft = ax - aw;
        const gapLeft = o.gapX;
        const gapRight = o.gapX + 60;
        if(aiLeft > gapLeft && aiRight < gapRight) return;
      }
      
      o.active=false;
      spawnParticles(616.66+ax+20,ay,o.color||'#ff4444',12);
      state.shake=5;
      ai.streak=0;
      ai.invincible=1.0;
      
      if(o.type==='fas'){
        ai.speed=0.5;
        setTimeout(()=>{ai.speed=1;},2000);
        spawnPopup(666.66+ax,ay-50,'ЗАМЕДЛЕНИЕ!','#ff8800');
      }
      else if(o.type==='act'){
        ai.speed=0;
        setTimeout(()=>{ai.speed=1;},1000);
        spawnPopup(666.66+ax,ay-50,'ПРОВЕРКА!','#ff4444');
      }
      else if(o.type==='brief'){
        ai.y=Math.min(ai.y+60,520);
        spawnPopup(666.66+ax,ay-50,'ОТКАТ!','#aa44ff');
      }
      else if(o.type==='storm'){
        ai.score = Math.max(0, ai.score - 100);
        spawnPopup(666.66+ax,ay-50,'ШТРАФ!','#44ccff');
      }
      else if(o.type==='hole'){
        spawnPopup(666.66+ax,ay-50,'ДЫРА В ОТЧЁТЕ!','#ff0000');
        ai.speed=0.2; 
        setTimeout(()=>{ai.speed=1;}, 2000);
      }
      else {
        ai.score = Math.max(0, ai.score - 50);
      }
    }
  });

  // Сбор бонусов игроком - БАЛАНСИРОВКА
  for(let i=state.powerups.length-1; i>=0; i--){
    const pu = state.powerups[i];
    if(pu.lane !== 'player') continue;
    
    const playerLeft = p.x - 16;
    const playerRight = p.x + 20;
    const playerTop = p.y - 28;
    const playerBottom = p.y + 28;
    const puLeft = pu.x - 15;
    const puRight = pu.x + 15;
    const puTop = pu.y - 15;
    const puBottom = pu.y + 15;
    if(playerLeft < puRight && playerRight > puLeft && playerTop < puBottom && playerBottom > puTop){
      state.powerups.splice(i,1);
      if(pu.effect==='deadline'){
        p.score+=300; // УМЕНЬШЕНО С 500
        spawnParticles(p.x+50,p.y,'#ff0000',20);
        spawnPopup(p.x+50,p.y-50,'ДЕДЛАЙН ПОЙМАН! +300','#ff0000');
      } else if (pu.effect==='score100'){
        p.score+=100;
        spawnParticles(p.x+50,p.y,'#00ff66',15);
        spawnPopup(p.x+50,p.y-50,'+100 ПОЧЁТНАЯ ГРАМОТА','#00ff66');
      } else {
        p.score+=30; // УМЕНЬШЕНО С 50
        p.activePowerup=pu.effect;
        p.powerupTimer=8;
        spawnParticles(p.x+50,p.y,'#ffd700',10);
        spawnPopup(p.x+50,p.y-50,'+30 '+pu.name,'#ffd700');
        if(pu.effect==='turbo')playTurbo();
        else playCollect();
      }
      p.streak++;
      // УБРАНО ДВОЙНОЕ НАЧИСЛЕНИЕ: p.score += p.streak * 5;
    }
  }
  
  // Сбор бонусов алгоритмом - БАЛАНСИРОВКА
  for(let i=state.powerups.length-1; i>=0; i--){
    const pu = state.powerups[i];
    if(pu.lane !== 'ai') continue;
    
    const ai=state.ai;
    const aiLeft = ai.x - 16;
    const aiRight = ai.x + 20;
    const aiTop = ai.y - 28;
    const aiBottom = ai.y + 28;
    const puLeft = pu.x - 15;
    const puRight = pu.x + 15;
    const puTop = pu.y - 15;
    const puBottom = pu.y + 15;
    if(aiLeft < puRight && aiRight > puLeft && aiTop < puBottom && aiBottom > puTop){
      state.powerups.splice(i,1);
      if(pu.effect==='deadline'){
        ai.score+=300; // УМЕНЬШЕНО С 500
        spawnPopup(666.66+ai.x,ai.y-50,'ДЕДЛАЙН! +300','#ff0000');
      } else if (pu.effect==='score100'){
        ai.score+=100;
        spawnPopup(666.66+ai.x,ai.y-50,'+100 ОЧКОВ','#00ff66');
      } else {
        ai.score+=30; // УМЕНЬШЕНО С 50
        ai.activePowerup=pu.effect;
        ai.powerupTimer=8;
        spawnPopup(666.66+ai.x,ai.y-50,'+30 БОНУС','#ffd700');
      }
      ai.streak++;
      // УБРАНО ДВОЙНОЕ НАЧИСЛЕНИЕ: ai.score += ai.streak * 5;
    }
  }
}

function update(dt){
  if(state.screen==='countdown'){
    state.countdown-=dt;
    if(Math.ceil(state.countdown)!==Math.ceil(state.countdown+dt)){
      playCountdown(Math.ceil(state.countdown));
    }
    if(state.countdown<=0){
      state.screen='playing';
      state.gameStartTime = Date.now();
      startBGMusic();
    }
    return;
  }
  if(state.screen!=='playing')return;

  const elapsed = (Date.now() - state.gameStartTime) / 1000;
  state.timer = Math.max(0, GAME_DURATION - elapsed);
  
  if(state.timer<=0){
    state.timer=0;
    endGame();
    return;
  }

  const speedProgress = elapsed / GAME_DURATION;
  state.speed = 3.5 + speedProgress * 2.5;

  state.roadOffset+=state.speed*dt*60;
  state.buildingOffset+=state.speed*dt*18;

  if(state.shake>0)state.shake-=dt*20;

  state.ministerTimer-=dt;
  if(state.ministerTimer<=0){
    state.ministerTimer=30;
    state.ministerMsg=MINISTER_MSGS[Math.floor(Math.random()*MINISTER_MSGS.length)];
    state.ministerVisible=3;
  }
  if(state.ministerVisible>0)state.ministerVisible-=dt;

  const spawnRate = 1.2 - (speedProgress * 0.3);
  state.spawnTimer+=dt;
  if(state.spawnTimer>=spawnRate){
    state.spawnTimer=0;
    spawnObstacle();
  }

  state.powerupSpawnTimer-=dt;
  if(state.powerupSpawnTimer<=0){
    state.powerupSpawnTimer=3 + Math.random()*2;
    spawnPowerup();
  }

  const p=state.player;
  const moveDir=state.invertControls?-1:1;
  
  let leftPressed = state.keys['ArrowLeft']||state.keys['a']||state.keys['A']||state.keys['KeyA']||state.keys['ф']||state.keys['Ф'];
  let rightPressed = state.keys['ArrowRight']||state.keys['d']||state.keys['D']||state.keys['KeyD']||state.keys['в']||state.keys['В'];
  let upPressed = state.keys['ArrowUp']||state.keys['w']||state.keys['W']||state.keys['KeyW']||state.keys['ц']||state.keys['Ц'];
  let downPressed = state.keys['ArrowDown']||state.keys['s']||state.keys['S']||state.keys['KeyS']||state.keys['ы']||state.keys['Ы'];
  
  if(leftPressed) p.vx=-6*moveDir;
  else if(rightPressed) p.vx=6*moveDir;
  else p.vx*=0.7;

  state.accelMsgCd=(state.accelMsgCd||0)-dt;
  state.decelMsgCd=(state.decelMsgCd||0)-dt;

  if(upPressed){
    p.vy=-6*moveDir;
    if(state.accelMsgCd<=0){spawnPopup(p.x+50,p.y-50,'🚀 Ускоряемся!','#00ff88');state.accelMsgCd=1.5;}
  }
  else if(downPressed){
    p.vy=6*moveDir;
    if(state.decelMsgCd<=0){spawnPopup(p.x+50,p.y-50,'🛑 Замедляемся!','#ff4444');state.decelMsgCd=1.5;}
  }
  else p.vy*=0.7;

  const speedMult=p.activePowerup==='turbo'?2:p.activePowerup==='speed'?1.5:1;
  p.x+=p.vx*p.speed*speedMult;
  p.x=Math.max(28,Math.min(p.x,272));
  p.y+=p.vy*p.speed*speedMult;
  p.y=Math.max(50,Math.min(p.y,550));
  
  // Сброс скорости при ударе о стену
  if(p.x <= 28 && p.vx < 0) {
    p.vx = 0;
    state.keys['ArrowLeft'] = false;
    state.keys['a'] = false;
    state.keys['A'] = false;
    state.keys['KeyA'] = false;
  }
  if(p.x >= 272 && p.vx > 0) {
    p.vx = 0;
    state.keys['ArrowRight'] = false;
    state.keys['d'] = false;
    state.keys['D'] = false;
    state.keys['KeyD'] = false;
  }
  if(p.y <= 50 && p.vy < 0) {
    p.vy = 0;
    state.keys['ArrowUp'] = false;
    state.keys['w'] = false;
    state.keys['W'] = false;
    state.keys['KeyW'] = false;
  }
  if(p.y >= 550 && p.vy > 0) {
    p.vy = 0;
    state.keys['ArrowDown'] = false;
    state.keys['s'] = false;
    state.keys['S'] = false;
    state.keys['KeyS'] = false;
  }

  // БАЛАНСИРОВКА: одинаковая база начисления очков
  const streakMult = 1 + (state.player.streak * 0.02); // УМЕНЬШЕН МНОЖИТЕЛЬ С 0.05
  const baseScore = state.speed * dt * 8; // ОДИНАКОВАЯ БАЗА
  p.score += baseScore * streakMult; // УБРАН p.speed ИЗ МНОЖИТЕЛЯ

  if(p.activePowerup){
    p.powerupTimer-=dt;
    if(p.powerupTimer<=0)p.activePowerup=null;
  }

  if(p.invincible>0)p.invincible-=dt;

  updateAI(dt);

  state.obstacles.forEach(o=>{o.y+=o.speed*dt*60;if(o.type==='storm')o.rot=(o.rot||0)+2*dt;});
  state.obstacles=state.obstacles.filter(o=>{
    if(o.y>H+100&&o.lane==='player'&&o.active&&!o.scored){
      o.scored = true;
      p.streak++;
      if(p.streak>1)spawnPopup(p.x+50,p.y-60,'x'+p.streak+' СЕРИЯ!','#00ff88');
    }
    // ИСПРАВЛЕНИЕ БАГА: добавляем streak алгоритму за избегание препятствий
    if(o.y>H+100&&o.lane==='ai'&&o.active&&!o.scored){
      o.scored = true;
      state.ai.streak++;
    }
    return o.y<H+120;
  });

  state.powerups.forEach(pu=>pu.y+=pu.speed*dt*60);
  state.powerups=state.powerups.filter(pu=>pu.y<H+50);

  state.particles.forEach(p2=>{p2.x+=p2.vx*dt*60;p2.y+=p2.vy*dt*60;p2.vy+=0.1;p2.life-=dt*1.5;});
  state.particles=state.particles.filter(p2=>p2.life>0);

  state.popups.forEach(p2=>{p2.y+=p2.vy*dt*60;p2.life-=dt*1.2;});
  state.popups=state.popups.filter(p2=>p2.life>0);

  playerBubble.timer -= dt;
  playerBubble.nextIn -= dt;
  if(playerBubble.nextIn <= 0){
    playerBubble.text = PLAYER_PHRASES[Math.floor(Math.random()*PLAYER_PHRASES.length)];
    playerBubble.timer = 2.5;
    playerBubble.nextIn = 3 + Math.random()*4;
  }
  aiBubble.timer -= dt;
  aiBubble.nextIn -= dt;
  if(aiBubble.nextIn <= 0){
    const pool = state.ai.mode==='ГЛЮК'
      ? ['Ошибка 404: совесть','Перезагрузка...','Сбой системы!','ГЛЮК ГЛЮК ГЛЮК']
      : state.ai.mode==='ЧИТЕР'
      ? ['Читаю базу данных!','Доступ разрешён!','Хакую тендер!','Обхожу ФАС!']
      : AI_PHRASES;
    aiBubble.text = pool[Math.floor(Math.random()*pool.length)];
    aiBubble.timer = 2.5;
    aiBubble.nextIn = 2.5 + Math.random()*3;
  }

  checkCollisions();
}

function endGame(){
  state.screen='results';
  state.resultsIndex=0;
  state.gameOverTimer = 2;
  stopBGMusic();
  if(state.player.score>state.ai.score)playWin();
  const date=new Date().toLocaleDateString('ru-RU');
  state.leaderboard.push({score:Math.floor(state.player.score), date: date, org: playerOrg});
  state.leaderboard.sort((a,b)=>b.score-a.score);
  state.leaderboard=state.leaderboard.slice(0,20);
  localStorage.setItem('tf_lb',JSON.stringify(state.leaderboard));
}

function render(){
  ctx.save();
  if(state.shake>0 && state.screen==='playing'){
    ctx.translate((Math.random()-0.5)*state.shake,(Math.random()-0.5)*state.shake);
  }

  if(state.screen==='title')drawTitle();
  else if(state.screen==='countdown')drawCountdown();
  else if(state.screen==='playing')drawGame();
  else if(state.screen==='pause')drawPause();
  else if(state.screen==='results')drawResults();
  ctx.restore();
}

function loop(ts){
  const dt=Math.min((ts-state.lastTime)/1000,0.05);
  state.lastTime=ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

document.addEventListener('keydown',function(e){
  if(AC.state==='suspended')AC.resume();
  
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)){
    e.preventDefault();
  }
  
  state.keys[e.key]=true;
  if(e.code) state.keys[e.code]=true;
  
  if(state.screen==='title'){
    if(e.key==='ArrowDown' || e.key==='s' || e.key==='S' || e.key==='ы' || e.key==='Ы'){
      state.titleIndex = (state.titleIndex + 1) % 2;
    }
    if(e.key==='ArrowUp' || e.key==='w' || e.key==='W' || e.key==='ц' || e.key==='Ц'){
      state.titleIndex = (state.titleIndex - 1 + 2) % 2;
    }
    if(e.key==='Enter'){
      if(state.titleIndex === 0) resetGame();
      else if(state.titleIndex === 1) showRecordsModal();
    }
  }
  
  if(state.screen==='pause'){
    if(e.key==='ArrowDown' || e.key==='s' || e.key==='S' || e.key==='ы' || e.key==='Ы'){
      state.pauseIndex = (state.pauseIndex + 1) % 3;
    }
    if(e.key==='ArrowUp' || e.key==='w' || e.key==='W' || e.key==='ц' || e.key==='Ц'){
      state.pauseIndex = (state.pauseIndex - 1 + 3) % 3;
    }
    if(e.key==='Enter'){
      if(state.pauseIndex===0) state.screen='playing';
      else if(state.pauseIndex===1) resetGame();
      else {state.screen='title';stopBGMusic();}
    }
  }
  
  if(state.screen==='results'){
    if(e.key==='ArrowRight' || e.key==='d' || e.key==='D' || e.key==='в' || e.key==='В'){
      state.resultsIndex = (state.resultsIndex + 1) % 3;
    }
    if(e.key==='ArrowLeft' || e.key==='a' || e.key==='A' || e.key==='ф' || e.key==='Ф'){
      state.resultsIndex = (state.resultsIndex - 1 + 3) % 3;
    }
    if(e.key==='Enter'){
      if(state.resultsIndex===0) resetGame();
      else if(state.resultsIndex===1) {
        state.screen='title';
        stopBGMusic();
      }
      else if(state.resultsIndex===2) {
        state.leaderboard=[];
        localStorage.removeItem('tf_lb');
      }
    }
  }
  
  if(e.key==='Escape'){
    if(state.screen==='playing'){state.screen='pause';state.pauseIndex=0;}
    else if(state.screen==='pause'){state.screen='title';stopBGMusic();}
    else if(state.screen==='results')state.screen='title';
  }
},true);

document.addEventListener('keyup',function(e){
  state.keys[e.key]=false;
  if(e.code) state.keys[e.code]=false;
},true);

canvas.addEventListener('click',e=>{
  if(AC.state==='suspended')AC.resume();
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)/rect.width*1066.666;
  const my=(e.clientY-rect.top)/rect.height*600;

  if(state.screen==='title'){
    if(mx>383.33&&mx<683.33&&my>465&&my<520)resetGame();
    if(mx>433.33&&mx<633.33&&my>535&&my<575){
      showRecordsModal();
    }
  }
  if(state.screen==='pause'){
    if(my>230&&my<278)state.screen='playing';
    if(my>300&&my<348)resetGame();
    if(my>370&&my<418){state.screen='title';stopBGMusic();}
  }
  if(state.screen==='results'){
    if(mx>133.33&&mx<333.33&&my>500&&my<550){
      state.resultsIndex=0;
      resetGame();
    }
    if(mx>433.33&&mx<633.33&&my>500&&my<550){
      state.resultsIndex=1;
      state.screen='title';
      stopBGMusic();
    }
    if(mx>733.33&&mx<933.33&&my>500&&my<550){
      state.resultsIndex=2;
      state.leaderboard=[];
      localStorage.removeItem('tf_lb');
    }
  }
  if(state.screen==='playing'){
    if(mx>956.66&&mx<1056.66&&my>65&&my<97)resetGame();
    if(mx>956.66&&mx<1056.66&&my>102&&my<134){state.screen='title';stopBGMusic();}
  }
});

canvas.addEventListener('touchstart',e=>{
  if(AC.state==='suspended')AC.resume();
  state.touchStartX=e.touches[0].clientX;
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  const dx=e.touches[0].clientX-state.touchStartX;
  if(Math.abs(dx)>10){state.keys[dx<0?'ArrowLeft':'ArrowRight']=true;state.keys[dx<0?'ArrowRight':'ArrowLeft']=false;}
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend',e=>{
  state.keys['ArrowLeft']=false;state.keys['ArrowRight']=false;
  e.preventDefault();
},{passive:false});

requestAnimationFrame(loop);
</script>
