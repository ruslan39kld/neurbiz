// ═══ PARTICLES ═══
function spawnParticles(x,y,color,n=10){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=2+Math.random()*4;
    state.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color,r:3+Math.random()*4});
  }
}
function spawnPopup(x,y,text,color='#ffd700'){
  state.popups.push({x,y,text,color,life:1,vy:-1.5});
}

// ═══ DRAW HELPERS ═══
function scale(x,y,w,h){
  const sx=canvas.width/W, sy=canvas.height/H;
  return[x*sx,y*sy,w*sx,h*sy];
}
function s(v){return v*canvas.width/W;}

function drawRoundRect(x,y,w,h,r,fill,stroke){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=s(2);ctx.stroke();}
}

// ═══ DRAW VEHICLES ═══
function drawPlayerCar(cx,cy){
  const x=s(cx-20), y=s(cy-30), sc=s(1);
  // Shadow
  ctx.save();ctx.globalAlpha=0.3;
  drawRoundRect(x+sc*2,y+sc*2,sc*40,sc*60,sc*6,'#000');
  ctx.restore();
  // Body
  drawRoundRect(x,y,sc*40,sc*60,sc*8,'#1a3a8a','#2a5aee');
  // Windshield front
  drawRoundRect(x+sc*5,y+sc*5,sc*30,sc*18,sc*4,'rgba(150,200,255,0.7)','#4488ff');
  // Windshield rear
  drawRoundRect(x+sc*5,y+sc*37,sc*30,sc*14,sc*4,'rgba(100,150,200,0.5)','#3366cc');
  // Roof
  drawRoundRect(x+sc*8,y+sc*14,sc*24,sc*26,sc*4,'#0f2060');
  // Wheels
  [[0,8],[32,8],[0,44],[32,44]].forEach(([wx,wy])=>{
    ctx.beginPath();ctx.arc(x+sc*wx+sc*4,y+sc*wy+sc*4,sc*5,0,Math.PI*2);
    ctx.fillStyle='#111';ctx.fill();
    ctx.beginPath();ctx.arc(x+sc*wx+sc*4,y+sc*wy+sc*4,sc*3,0,Math.PI*2);
    ctx.fillStyle='#444';ctx.fill();
  });
  // Headlights
  ctx.fillStyle='#ffffaa';
  ctx.fillRect(x+sc*5,y+sc*2,sc*10,sc*5);
  ctx.fillRect(x+sc*25,y+sc*2,sc*10,sc*5);
  // Taillights
  ctx.fillStyle='#ff2200';
  ctx.fillRect(x+sc*5,y+sc*53,sc*10,sc*5);
  ctx.fillRect(x+sc*25,y+sc*53,sc*10,sc*5);
  // Plate
  drawRoundRect(x+sc*10,y+sc*55,sc*20,sc*8,sc*2,'#fff');
  ctx.fillStyle='#000';ctx.font=`bold ${s(5)}px Roboto`;ctx.textAlign='center';
  ctx.fillText('ГОС001',x+sc*20,y+sc*62);
  // Exhaust
  if(Math.random()>0.5){
    state.particles.push({x:cx-5+Math.random()*10,y:cy+32,vx:(Math.random()-0.5),vy:1+Math.random(),life:0.8,color:'rgba(180,180,180,0.5)',r:3+Math.random()*3});
  }
}

function drawAICar(cx,cy,glitch=false){
  const x=s(cx-20), y=s(cy-30), sc=s(1);
  // Glow
  ctx.save();ctx.globalAlpha=0.2;
  ctx.shadowBlur=s(20);ctx.shadowColor='#00ffff';
  drawRoundRect(x-sc*3,y-sc*3,sc*46,sc*66,sc*10,'#00ffff');
  ctx.restore();
  // Body
  const bodyColor=glitch?'#ff2244':'#e8e8f0';
  drawRoundRect(x,y,sc*40,sc*60,sc*6,bodyColor,'#00ddff');
  // Cyan accent lines
  ctx.strokeStyle='#00ffff';ctx.lineWidth=s(2);
  ctx.beginPath();ctx.moveTo(x+sc*5,y+sc*20);ctx.lineTo(x+sc*35,y+sc*20);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+sc*5,y+sc*40);ctx.lineTo(x+sc*35,y+sc*40);ctx.stroke();
  // Windshield
  drawRoundRect(x+sc*5,y+sc*5,sc*30,sc*18,sc*4,'rgba(0,200,255,0.4)','#00ccff');
  // Roof display
  drawRoundRect(x+sc*8,y+sc*14,sc*24,sc*22,sc*3,'#001122');
  ctx.fillStyle='#00ffff';ctx.font=`bold ${s(6)}px Orbitron`;ctx.textAlign='center';
  ctx.fillText('AI-44',x+sc*20,y+sc*28);
  // Wheels
  [[0,8],[32,8],[0,44],[32,44]].forEach(([wx,wy])=>{
    ctx.beginPath();ctx.arc(x+sc*wx+sc*4,y+sc*wy+sc*4,sc*5,0,Math.PI*2);
    ctx.fillStyle='#112233';ctx.fill();
    ctx.beginPath();ctx.arc(x+sc*wx+sc*4,y+sc*wy+sc*4,sc*3,0,Math.PI*2);
    ctx.fillStyle='#00aacc';ctx.fill();
  });
  // Headlights (cyan pulsing)
  ctx.fillStyle=`rgba(0,255,255,${0.7+Math.sin(Date.now()/200)*0.3})`;
  ctx.fillRect(x+sc*5,y+sc*2,sc*10,sc*4);
  ctx.fillRect(x+sc*25,y+sc*2,sc*10,sc*4);
  // Sparks
  if(Math.random()>0.6){
    state.particles.push({x:cx+Math.random()*10-5,y:cy+32,vx:(Math.random()-0.5)*2,vy:1+Math.random(),life:0.5,color:'#00ffff',r:2});
  }
  // Glitch effect
  if(glitch){
    ctx.save();ctx.globalAlpha=0.4;
    ctx.fillStyle='#ff0044';
    ctx.fillRect(x+Math.random()*10,y+Math.random()*10,sc*40,sc*5);
    ctx.fillStyle='#00ffff';
    ctx.fillRect(x+Math.random()*10,y+sc*30+Math.random()*10,sc*40,sc*3);
    ctx.restore();
  }
}

// ═══ DRAW OBSTACLES ═══
function drawObstacle(ob){
  ctx.save();
  if (ob.lane === 'ai') ctx.translate(s(566.666), 0);
  const x=s(ob.x-ob.tw/2), y=s(ob.y-ob.th/2), w=s(ob.tw), h=s(ob.th);
  const t=ob.type;
  if(t==='storm'){
    ctx.translate(s(ob.x),s(ob.y));
    ctx.rotate(ob.rot||0);
    ctx.translate(-s(ob.x),-s(ob.y));
  }
  if(t==='fas'){
    // Document with red header
    drawRoundRect(x,y,w,h,s(5),'#f5f5f5','#cc0000');
    ctx.fillStyle='#cc0000';ctx.fillRect(x,y,w,h*0.3);
    ctx.fillStyle='#fff';ctx.font=`bold ${s(7)}px Roboto`;ctx.textAlign='center';
    ctx.fillText('ФАС',x+w/2,y+h*0.2);
    // Lines
    ctx.strokeStyle='#ccc';ctx.lineWidth=s(1);
    [0.45,0.6,0.75,0.88].forEach(p=>{ctx.beginPath();ctx.moveTo(x+w*0.1,y+h*p);ctx.lineTo(x+w*0.9,y+h*p);ctx.stroke();});
    // Stamp
    ctx.beginPath();ctx.arc(x+w*0.75,y+h*0.7,s(10),0,Math.PI*2);
    ctx.strokeStyle='#cc0000';ctx.lineWidth=s(2);ctx.stroke();
    ctx.fillStyle='#cc000055';ctx.fill();
  } else if(t==='act'){
    // Clipboard
    drawRoundRect(x,y,w,h,s(4),'#d4a574','#8b6340');
    ctx.fillStyle='#c8956a';ctx.fillRect(x+s(2),y+h*0.1,w-s(4),h*0.85);
    // Clip
    drawRoundRect(x+w*0.3,y-s(5),w*0.4,s(12),s(4),'#888','#555');
    // Checkboxes
    [[0.15,0.3],[0.15,0.5],[0.15,0.7]].forEach(([cx2,cy2])=>{
      ctx.strokeStyle='#333';ctx.lineWidth=s(1.5);
      ctx.strokeRect(x+w*cx2,y+h*cy2,s(10),s(10));
      if(Math.random()>0.5){ctx.beginPath();ctx.moveTo(x+w*cx2+s(2),y+h*cy2+s(5));ctx.lineTo(x+w*cx2+s(5),y+h*cy2+s(9));ctx.lineTo(x+w*cx2+s(10),y+h*cy2+s(1));ctx.stroke();}
    });
  } else if(t==='letter'){
    // Envelope
    drawRoundRect(x,y,w,h,s(4),'#fff8ee','#0044aa');
    ctx.strokeStyle='#0044aa';ctx.lineWidth=s(1.5);
    ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+w/2,y+h*0.5);ctx.lineTo(x+w,y);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x,y+h);ctx.lineTo(x+w/2,y+h*0.5);ctx.lineTo(x+w,y+h);ctx.stroke();
    // Wax seal
    ctx.beginPath();ctx.arc(x+w/2,y+h/2,s(8),0,Math.PI*2);
    ctx.fillStyle='#aa2200';ctx.fill();
    ctx.fillStyle='#ff4400';ctx.font=`bold ${s(8)}px Roboto`;ctx.textAlign='center';
    ctx.fillText('М',x+w/2,y+h/2+s(3));
  } else if(t==='brief'){
    // Briefcase
    drawRoundRect(x,y+h*0.15,w,h*0.85,s(5),'#8b6340','#5a3d20');
    drawRoundRect(x+w*0.2,y,w*0.6,h*0.25,s(4),'#6b4820','#5a3d20');
    ctx.strokeStyle='#ffd700';ctx.lineWidth=s(2);
    ctx.beginPath();ctx.moveTo(x+w/2-s(10),y+h*0.55);ctx.lineTo(x+w/2+s(10),y+h*0.55);ctx.stroke();
    ctx.fillStyle='#ffd700';ctx.font=`${s(16)}px Roboto`;ctx.textAlign='center';
    ctx.fillText('₽',x+w/2,y+h*0.75);
    // Warning
    ctx.font=`${s(14)}px Roboto`;ctx.fillText('⚠',x+w/2,y+h*0.35);
  } else if(t==='storm'){
    // Vortex of papers
    ctx.globalAlpha=0.9;
    for(let i=0;i<8;i++){
      const a=(ob.rot||0)+i*Math.PI/4, r=s(25);
      const px=s(ob.x)+Math.cos(a)*r, py=s(ob.y)+Math.sin(a)*r;
      ctx.save();ctx.translate(px,py);ctx.rotate(a+Math.PI/4);
      ctx.fillStyle=`hsl(${i*45},60%,80%)`;
      ctx.fillRect(-s(6),-s(8),s(12),s(16));
      ctx.restore();
    }
    ctx.fillStyle='rgba(100,200,255,0.3)';
    ctx.beginPath();ctx.arc(s(ob.x),s(ob.y),s(25),0,Math.PI*2);ctx.fill();
  } else if(t==='reorg'){
    // Wall of filing cabinets
    const nCabinets=Math.floor(ob.tw/50);
    for(let i=0;i<nCabinets;i++){
      const cx3=x+i*(w/nCabinets);
      drawRoundRect(cx3+s(2),y,w/nCabinets-s(4),h,s(3),'#7a8899','#556677');
      ctx.fillStyle='#889aaa';ctx.fillRect(cx3+s(4),y+h*0.15,w/nCabinets-s(8),h*0.25);
      ctx.fillStyle='#889aaa';ctx.fillRect(cx3+s(4),y+h*0.5,w/nCabinets-s(8),h*0.25);
      ctx.fillStyle='#aabbcc';ctx.fillRect(cx3+s(4)+w/(nCabinets*2)-s(4),y+h*0.25,s(8),s(4));
      ctx.fillStyle='#aabbcc';ctx.fillRect(cx3+s(4)+w/(nCabinets*2)-s(4),y+h*0.63,s(8),s(4));
    }
    // Gap
    if(ob.gapX!==undefined){
      ctx.clearRect(s(ob.gapX),y-s(2),s(60),h+s(4));
    }
  } else if(t==='sequestr'){
    // Side walls closing in
    drawRoundRect(x,y,w,h,s(4),'#e6005c','#aa0044');
    ctx.fillStyle='#fff';ctx.font=`bold ${s(8)}px Roboto`;ctx.textAlign='center';
    ctx.fillText('₽',x+w/2,y+h*0.55);
    ctx.font=`${s(6)}px Roboto`;ctx.fillText('СЕКВЕСТР',x+w/2,y+h*0.8);
  } else if(t==='hole'){
    // Warning barrier visual instead of black hole
    ctx.save(); ctx.translate(x, y+h/2-s(15));
    drawRoundRect(0,0,w,s(30),s(4),'#ffaa00','#000');
    // Hazard stripes
    ctx.beginPath();
    ctx.rect(0,0,w,s(30)); ctx.clip();
    for(let st=0; st<w/10+5; st++){
      ctx.fillStyle='#000';
      ctx.beginPath();
      ctx.moveTo(st*10, 0); ctx.lineTo(st*10+10, 0);
      ctx.lineTo(st*10-10, s(30)); ctx.lineTo(st*10-20, s(30));
      ctx.fill();
    }
    ctx.restore();
    ctx.fillStyle='#fff';ctx.font=`bold ${s(10)}px Russo One`;ctx.textAlign='center';
    ctx.shadowBlur=s(4); ctx.shadowColor='#000';
    ctx.fillText('КОНТРАКТ',x+w/2,y+h/2-s(20));
    ctx.fillText('РАЗОРВАН',x+w/2,y+h/2+s(30));
    ctx.shadowBlur=0;
  }
  ctx.restore();
}

// ═══ DRAW POWERUPS ═══
function drawPowerup(p){
  const x=s(p.x), y=s(p.y);
  const t=Date.now()/1000;
  // Rotating aura
  ctx.save();
  for(let i=0;i<8;i++){
    const a=t*2+i*Math.PI/4;
    ctx.beginPath();
    ctx.arc(x+Math.cos(a)*s(18),y+Math.sin(a)*s(18),s(3),0,Math.PI*2);
    ctx.fillStyle=p.color;ctx.globalAlpha=0.7;ctx.fill();
  }
  ctx.restore();
  // Glow
  ctx.save();ctx.shadowBlur=s(15);ctx.shadowColor=p.color;
  ctx.beginPath();ctx.arc(x,y,s(16),0,Math.PI*2);
  ctx.fillStyle=p.color+'44';ctx.fill();
  ctx.strokeStyle=p.color;ctx.lineWidth=s(2);ctx.stroke();
  ctx.restore();

function drawRoad(laneX,offset){
  const x=s(laneX), w=s(ROAD_W);
  // Asphalt
  ctx.fillStyle='#1a1a2e';ctx.fillRect(x,0,w,canvas.height);
  // Edge lines
  ctx.strokeStyle='#ffffff44';ctx.lineWidth=s(3);
  ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+w,0);ctx.lineTo(x+w,canvas.height);ctx.stroke();
  // Dashed center
  ctx.strokeStyle='#ffffff88';ctx.lineWidth=s(3);
  ctx.setLineDash([s(30),s(20)]);
  ctx.lineDashOffset=-offset*s(1);
  ctx.beginPath();ctx.moveTo(x+w/2,0);ctx.lineTo(x+w/2,canvas.height);ctx.stroke();
  ctx.setLineDash([]);
}

const BUILDING_COLORS=['#1a1a3e','#0d1b2a','#1a2a1a','#2a1a1a','#1a1a1a'];
function drawBuildings(side,offset){
  const buildings=[
    {x:side==='left'?10:926.66,w:80,h:200,color:'#1a1a3e',windows:true},
    {x:side==='left'?20:916.66,w:100,h:280,color:'#0d1b2a',windows:true},
    {x:side==='left'?5:936.66,w:60,h:160,color:'#1a2a1a',windows:false},
  ];
  buildings.forEach((b,i)=>{
    const by=(offset*0.3+i*200)%700-200;
    const bx=s(b.x), bw=s(b.w), bh=s(b.h);
    // Building
    ctx.fillStyle=b.color;
    ctx.fillRect(bx,s(by),bw,bh);
    // Columns
    ctx.fillStyle='#ffffff15';
    for(let c=0;c<3;c++){ctx.fillRect(bx+bw*0.1+c*(bw*0.3),s(by)+bh*0.2,bw*0.08,bh*0.75);}
    // Windows
    if(b.windows){
      ctx.fillStyle='#ffff8844';
      for(let wy=0;wy<4;wy++)for(let wx2=0;wx2<3;wx2++){
        if(Math.random()>0.3)ctx.fillRect(bx+bw*0.1+wx2*(bw*0.3),s(by)+bh*0.25+wy*bh*0.15,bw*0.18,bh*0.1);
      }
    }
    // Soviet star
    ctx.fillStyle='#ff4444';ctx.font=`${s(12)}px Roboto`;ctx.textAlign='center';
    ctx.fillText('★',bx+bw/2,s(by)+s(15));
  });
}

function drawSidewalk(x,w){
  ctx.fillStyle='#2a2a3e';ctx.fillRect(s(x),0,s(w),canvas.height);
  // Tile pattern
  ctx.strokeStyle='#33334455';ctx.lineWidth=s(1);
  for(let ty=0;ty<H;ty+=20)for(let tx=0;tx<w;tx+=20){
    ctx.strokeRect(s(x+tx),s(ty),s(20),s(20));
  }
}

function drawSpeechBubble(x, y, text, color='#ffffff', bgColor='rgba(5,10,40,0.95)', borderColor='#ffd700'){
  if(!text)return;
  ctx.font = `bold ${s(15)}px Russo One`;
  const tw = ctx.measureText(text).width;
  const bw = tw + s(28), bh = s(36);
  const bx = Math.max(s(8), Math.min(s(x) - bw/2, s(1058)-bw));
  const by = s(y) - bh - s(22);
  // Glow shadow
  ctx.save();
  ctx.shadowBlur=s(12); ctx.shadowColor=borderColor;
  drawRoundRect(bx, by, bw, bh, s(8), bgColor, borderColor);
  ctx.restore();
  // Tail
  ctx.beginPath();
  ctx.moveTo(s(x)-s(8), by+bh);
  ctx.lineTo(s(x)+s(8), by+bh);
  ctx.lineTo(s(x), by+bh+s(12));
  ctx.closePath();
  ctx.fillStyle=bgColor; ctx.fill();
  ctx.strokeStyle=borderColor; ctx.lineWidth=s(2); ctx.stroke();
  // Text
  ctx.fillStyle=color;
  ctx.font=`bold ${s(15)}px Russo One`;
  ctx.textAlign='center';
  ctx.shadowBlur=0;
  ctx.fillText(text, bx+bw/2, by+bh-s(10));
}

// ═══ DRAW GAME ═══
function drawGame(){
  const sc=canvas.width/W;
  // Background
  ctx.fillStyle='#080c1a';ctx.fillRect(0,0,canvas.width,canvas.height);

  // Sidewalks + buildings
  drawSidewalk(0,50);
  drawSidewalk(350,266.66);
  drawSidewalk(916.66,150);
  drawBuildings('left',state.buildingOffset);
  drawBuildings('right',state.buildingOffset);

  // Roads
  drawRoad(50,state.roadOffset);
  drawRoad(616.66,state.roadOffset);

  // Center Divider Island
  ctx.fillStyle='#333344';ctx.fillRect(s(400),0,s(216.66),canvas.height);
  ctx.strokeStyle='#ffffff55';ctx.lineWidth=s(3);
  ctx.beginPath();ctx.moveTo(s(400),0);ctx.lineTo(s(400),canvas.height);ctx.stroke();
  ctx.beginPath();ctx.moveTo(s(616.66),0);ctx.lineTo(s(616.66),canvas.height);ctx.stroke();
  
  // Decorative Banners in center divider
  const bTexts = [
    "44-ФЗ", "223-ФЗ", "ГОСЗАКУПКИ.РУ", "ЕАСУЗ", "ЭЛЕКТРОННЫЙ АУКЦИОН",
    "ОТКРЫТЫЙ КОНКУРС", "ЗАПРОС КОТИРОВОК", "ЗАПРОС ПРЕДЛОЖЕНИЙ",
    "ЕДИНСТВЕННЫЙ ПОСТАВЩИК", "ЧЕСТНЫЕ ТОРГИ", "ПРОЗРАЧНОСТЬ",
    "ЭФФЕКТИВНОСТЬ", "ЦИФРОВИЗАЦИЯ", "КОНКУРЕНЦИЯ", "ОБОСНОВАНИЕ НМЦ",
    "ПЛАН-ГРАФИК", "РЕЕСТР КОНТРАКТОВ"
  ];
  const numBanners = 3;
  const bannerGap = 1200;
  for(let i=0; i<numBanners; i++){
    const totalDist = state.buildingOffset * 3 + i * bannerGap;
    const by2 = totalDist % (numBanners * bannerGap) - 400;
    const bannerIndex = Math.floor(totalDist / (numBanners * bannerGap)) * numBanners + i;
    const bText = bTexts[bannerIndex % bTexts.length];
    
    ctx.fillStyle='#222';ctx.fillRect(s(500), s(by2), s(16), s(20));
    ctx.fillStyle='#555';ctx.fillRect(s(504), s(by2+20), s(8), s(60));
    drawRoundRect(s(410), s(by2-60), s(196), s(80), s(5), '#0033aa', '#ffffff');
    ctx.fillStyle='#ffffff';
    
    let fontSize = 18;
    if(bText.length > 20) fontSize = 10;
    else if(bText.length > 15) fontSize = 12;
    else if(bText.length > 10) fontSize = 14;
    
    ctx.font=`bold ${s(fontSize)}px Russo One`;ctx.textAlign='center';
    ctx.fillText(bText, s(508), s(by2-15+(18-fontSize)/2));
    ctx.fillStyle='#ffffaa33';
    ctx.beginPath();ctx.moveTo(s(508), s(by2+20));ctx.lineTo(s(400), s(by2+150));ctx.lineTo(s(616), s(by2+150));ctx.fill();
  }

  // Obstacles player lane
  state.obstacles.filter(o=>o.lane==='player').forEach(o=>drawObstacle(o));
  // Obstacles AI lane
  state.obstacles.filter(o=>o.lane==='ai').forEach(o=>drawObstacle(o));

  // Powerups
  state.powerups.forEach(p=>drawPowerup(p));

  // Cars
  const px=state.player.x+50;
  const ax=state.ai.x+616.66;
  if(state.player.invincible>0 && Math.floor(Date.now()/100)%2===0){}else{drawPlayerCar(px,state.player.y);}
  drawAICar(ax,state.ai.y,state.ai.mode==='ГЛЮК');

  // Speech bubbles above cars
  if(playerBubble.text && playerBubble.timer>0){
    ctx.globalAlpha=Math.min(playerBubble.timer, 1);
    drawSpeechBubble(px+20, state.player.y-35, playerBubble.text, '#ffd700', 'rgba(5,10,40,0.93)', '#ffd700');
    ctx.globalAlpha=1;
  }
  if(aiBubble.text && aiBubble.timer>0){
    const aiColor = state.ai.mode==='ЧИТЕР'?'#ff4466':state.ai.mode==='ГЛЮК'?'#ffee00':'#00ddff';
    ctx.globalAlpha=Math.min(aiBubble.timer, 1);
    drawSpeechBubble(ax+20, state.ai.y-35, aiBubble.text, aiColor, 'rgba(0,10,30,0.93)', aiColor);
    ctx.globalAlpha=1;
  }

  // Particles
  state.particles.forEach(p=>{
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(s(p.x),s(p.y),s(p.r),0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  // Pipe Burst visuals
  if(state.pipeState === 1) {
     const t = state.pipeTimeLeft;
     const px = s(50), py = s(400); // Труба лопается сбоку дороги
     ctx.fillStyle='#555'; ctx.fillRect(px-s(40), py-s(20), s(50), s(40));
     ctx.fillStyle='rgba(0, 150, 255, 0.7)';
     // Фонтан поперек дороги
     ctx.beginPath();
     ctx.moveTo(px,py);
     ctx.lineTo(px+s(200), py-s(80));
     ctx.lineTo(px+s(220), py+s(50));
     ctx.fill();
     
     // HUD Notification
     ctx.fillStyle='#ff0000'; ctx.font=`bold ${s(22)}px Russo One`; ctx.textAlign='center';
     ctx.fillText('СБОР РЕШЕНИЯ! НУЖНО:', s(533.33), s(100));
     ctx.fillStyle='#00ff88'; ctx.font=`bold ${s(26)}px Russo One`;
     ctx.fillText(state.pipeTargetName, s(533.33), s(130));
  }

  // Popups — big bold text
  state.popups.forEach(p=>{
    ctx.save();
    ctx.globalAlpha=p.life;
    ctx.shadowBlur=s(16); ctx.shadowColor=p.color;
    ctx.fillStyle=p.color;
    ctx.font=`bold ${s(22)}px Russo One`; ctx.textAlign='center';
    // Outline
    ctx.strokeStyle='#000'; ctx.lineWidth=s(4);
    ctx.strokeText(p.text,s(p.x),s(p.y));
    ctx.fillText(p.text,s(p.x),s(p.y));
    ctx.restore();
  });
  ctx.globalAlpha=1;

  // HUD
  drawHUD();

  // Reset button
  drawRoundRect(s(956.66),s(65),s(100),s(32),s(8),'#aa220055','#ff4444');
  ctx.fillStyle='#fff';ctx.font=`bold ${s(11)}px Russo One`;ctx.textAlign='center';
  ctx.fillText('↺ СБРОС',s(1006.66),s(86));
  
  // Menu button
  drawRoundRect(s(956.66),s(102),s(100),s(32),s(8),'#1a3a8a55','#4488ff');
  ctx.fillStyle='#fff';ctx.font=`bold ${s(11)}px Russo One`;ctx.textAlign='center';
  ctx.fillText('⌂ В МЕНЮ',s(1006.66),s(123));

  // Minister message — BIG and readable
  if(state.ministerVisible>0){
    const alpha = Math.min(state.ministerVisible, 1);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowBlur = s(20); ctx.shadowColor = '#ffd700';
    drawRoundRect(s(213.33), s(430), s(640), s(100), s(16), 'rgba(3,8,30,0.97)', '#ffd700');
    ctx.restore();
    // Minister emoji portrait circle
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.beginPath(); ctx.arc(s(268.33), s(480), s(28), 0, Math.PI*2);
    ctx.fillStyle='#1a2a5a'; ctx.fill();
    ctx.strokeStyle='#ffd700'; ctx.lineWidth=s(3); ctx.stroke();
    ctx.font=`${s(28)}px Roboto`; ctx.textAlign='center';
    ctx.fillText('🧑‍💼', s(268.33), s(492));
    // Message text — BIG
    ctx.fillStyle='#ffd700';
    ctx.font=`bold ${s(22)}px Russo One`;
    ctx.textAlign='center';
    ctx.shadowBlur=s(10); ctx.shadowColor='#ffd700';
    ctx.fillText(state.ministerMsg, s(533.33), s(488));
    ctx.restore();
  }
}

// ═══ SPAWN LOGIC ═══
function spawnObstacle(){
  const types=OBSTACLE_TYPES;
  const lanes=['player','ai'];
  lanes.forEach(lane=>{
    if(Math.random()<0.85){
      const numObs = Math.random() < 0.25 ? 2 : 1; // Иногда стена из 2 препятствий
      let usedPos = [];
      for(let i=0; i<numObs; i++){
        let t = types[Math.floor(Math.random()*types.length)];
        if(Math.random() < 0.1) t = types.find(t=>t.id==='reorg'); // Чаще стены-реорганизации

        let posPick = Math.floor(Math.random()*3);
        while(usedPos.includes(posPick)) posPick = (posPick+1)%3;
        usedPos.push(posPick);

        let x = 50 + 50 + posPick*100 - (t.tw||t.w)/2; // Четко Лево(100), Центр(200), Право(300)
        let gapX = undefined;
        if(t.id==='reorg'){x=0;gapX=Math.random()*(ROAD_W-60);}
        if(t.id==='sequestr'){x=lane==='player'?50:0;}
        
        state.obstacles.push({
          type:t.id,tw:t.tw||t.w,th:t.th||t.h,
          x,y:-50,speed:state.speed+1+Math.random()*2,
          lane,rot:0,gapX,
          color:t.color,active:true,scored:false
        });
      }
    }
  });
}

function spawnPowerup(){
  const t=POWERUP_TYPES[Math.floor(Math.random()*POWERUP_TYPES.length)];
  const x=30+Math.random()*(ROAD_W-60);
  const puSpeed = (t.effect === 'deadline') ? (state.speed * 1.5 + 4) : 2;
  state.powerups.push({...t,x,y:-20,speed:puSpeed});
}

// ═══ AI LOGIC ═══
function updateAI(dt){
  const ai=state.ai;
  ai.modeTimer-=dt;
  if(ai.modeTimer<=0){
    const modes=['ОПТИМУМ','ГЛЮК','ЧИТЕР'];
    const dur=[15+Math.random()*10,8+Math.random()*7,5+Math.random()*5];
    ai.mode=modes[Math.floor(Math.random()*3)];
    ai.modeTimer=dur[modes.indexOf(ai.mode)];
  }

  const myObstacles=state.obstacles.filter(o=>o.lane==='ai'&&o.y>0&&o.y<H);
  const nearest=myObstacles.sort((a,b)=>a.y-b.y)[0];

  if(ai.mode==='ОПТИМУМ'){
    if(nearest){
      // Dodge away
      const mid=nearest.x+nearest.tw/2;
      ai.targetX=mid<150?200:50;
    } else {ai.targetX=120+Math.sin(Date.now()/1500)*60;}
    ai.x+=(ai.targetX-ai.x)*0.05;
    ai.score+=state.speed*dt*state.player.speed*4.0;
  } else if(ai.mode==='ГЛЮК'){
    ai.glitchTimer-=dt;
    if(ai.glitchTimer<=0){ai.glitchTimer=0.4+Math.random()*0.3;ai.targetX=20+Math.random()*260;}
    ai.x+=(ai.targetX-ai.x)*0.08;
    // Иногда сбой
    if(nearest&&Math.random()<0.001){
      spawnParticles(ai.x+450+20,ai.y,nearest.color,8);
      spawnPopup(ai.x+460,ai.y-40,'СБОЙ!','#ff4444');
      ai.score=Math.max(0,ai.score-100);
    }
    ai.score+=state.speed*dt*state.player.speed*2.0;
  } else { // ЧИТЕР
    if(nearest){
      const mid=nearest.x+nearest.tw/2;
      const dodge=mid<150?200:50;
      ai.targetX=dodge;
    } else {ai.targetX=120;}
    ai.x+=(ai.targetX-ai.x)*0.12;
    ai.score+=state.speed*dt*state.player.speed*1.2;
  }

  ai.x=Math.max(10,Math.min(ai.x,260));
}

// ═══ COLLISION ═══
function checkCollisions(){
  const p=state.player;
  const px=p.x+20, py=p.y;
  const pw=36,ph=56;

  // Obstacles
  state.obstacles.filter(o=>o.lane==='player'&&o.active).forEach(o=>{
    const ox=o.x, oy=o.y-o.th/2, ow=o.tw, oh=o.th;
    if(p.invincible>0)return;
    if(px<ox+ow*0.8&&px+pw>ox+ow*0.2&&py-ph/2<oy+oh&&py+ph/2>oy){
      if(o.type==='reorg'&&o.gapX!==undefined){
        if(px>o.gapX&&px<o.gapX+60)return;
      }
      o.active=false;
      if(p.activePowerup==='shield'){p.activePowerup=null;spawnPopup(px+50,py-50,'🛡 ЗАЩИТА!','#ffff00');return;}
      spawnParticles(px+50,py,o.color||'#ff4444',12);
      state.shake=8;
      // Effect by type
      if(o.type==='fas'){p.speed=0.5;setTimeout(()=>p.speed=1,2000);spawnPopup(px+50,py-50,'ЗАМЕДЛЕНИЕ!','#ff8800');}
      else if(o.type==='act'){p.speed=0;setTimeout(()=>p.speed=1,1000);spawnPopup(px+50,py-50,'ПРОВЕРКА!','#ff4444');}
      else if(o.type==='brief'){p.y=Math.min(p.y+60,520);spawnPopup(px+50,py-50,'ОТКАТ!','#aa44ff');}
      else if(o.type==='storm'){
        state.invertControls=true;setTimeout(()=>state.invertControls=false,3000);
        spawnPopup(px+50,py-50,'ИНВЕРСИЯ!','#44ccff');
      }
      else if(o.type==='hole'){
        spawnPopup(px+50,py-50,'ДЫРА!','#aa0000');
        state.shake=12;
        p.speed=0.2; setTimeout(()=>p.speed=1, 2000);
      }
      p.streak=0;
      p.invincible=1.5;
      playHit();
    }
  });

  // Powerups
  for(let i=state.powerups.length-1; i>=0; i--){
    const pu = state.powerups[i];
    const dx=(pu.x+50)-( p.x+20+18), dy=pu.y-(p.y);
    if(Math.sqrt(dx*dx+dy*dy)<s(40)/s(1)){
      if(pu.effect==='deadline' && p.vy >= -2) {
        continue;
      }
      state.powerups.splice(i,1);
      if(pu.effect==='deadline'){
        p.score+=500;
        spawnParticles(p.x+50,p.y,'#ff0000',20);
        spawnPopup(p.x+50,p.y-50,'ДЕДЛАЙН ПОЙМАН!','#ff0000');
      } else if (pu.effect==='score100'){
        p.score+=100;
        spawnParticles(p.x+50,p.y,'#00ff66',15);
        spawnPopup(p.x+50,p.y-50,'+100 ПОЧЁТНАЯ Грамота','#00ff66');
      } else if (pu.effect==='qte_correct'){
        if(state.pipeState===1) {
            state.pipeState = 0;
            p.score+=300;
            spawnPopup(p.x+50,p.y-50,'РЕШЕНИЕ НАЙДЕНО!','#00ff88');
        }
      } else if (pu.effect==='qte_wrong'){
        if(state.pipeState===1) {
            state.pipeState = 0;
            p.speed = 0.5; setTimeout(()=>p.speed=1, 2000);
            spawnPopup(p.x+50,p.y-50,'ОШИБКА РЕШЕНИЯ!','#ff4444');
        }
      } else {
        p.score+=50;
        p.activePowerup=pu.effect;
        p.powerupTimer=8;
        spawnParticles(p.x+50,p.y,'#ffd700',10);
        spawnPopup(p.x+50,p.y-50,'+50 '+pu.name,'#ffd700');
        if(pu.effect==='turbo')playTurbo();
        else playCollect();
      }
      p.streak++;
      p.score+=p.streak*10;
    }
  }
}

// ═══ UPDATE ═══
function update(dt){
  if(state.screen==='countdown'){
    state.countdown-=dt;
    if(Math.ceil(state.countdown)!==Math.ceil(state.countdown+dt)){
      playCountdown(Math.ceil(state.countdown));
    }
    if(state.countdown<=0){
      state.screen='playing';
      startBGMusic();
    }
    return;
  }
  if(state.screen!=='playing')return;

  // Timer
  state.timer-=dt;
  if(state.timer<=0){
    state.timer=0;
    endGame();
    return;
  }

  // Speed progression — SMOOTH
  const elapsed=GAME_DURATION-state.timer;
  let speedProgress = elapsed / GAME_DURATION;
  // Максимальная скорость значительно снижена для читаемости текста на баннерах
  state.speed = 3.5 + speedProgress * 2.5; // Начинает с 3.5, плавно доходит до 6.0 к концу игры

  // Road scroll
  state.roadOffset+=state.speed*dt*60;
  state.buildingOffset+=state.speed*dt*18;

  // Shake
  if(state.shake>0)state.shake-=dt*20;

  if(state.pipeState === 0){
    state.pipeEventTimer -= dt;
    if(state.pipeEventTimer <= 0 && state.timer < GAME_DURATION - 5){
      state.pipeState = 1; // Труба прорвана
      state.pipeTimeLeft = 8;
      state.pipeEventTimer = 25 + Math.random()*15;
      
      const choices = [
        {name: "п.9", icon: "📋", effect: 'qte_correct'},
        {name: "ТЗ", icon: "📝", effect: 'qte_wrong'},
        {name: "Финансирование", icon: "💸", effect: 'qte_wrong'}
      ].sort(() => Math.random() - 0.5);
      
      // Spawn them as powerups on the road!
      choices.forEach((ch, idx) => {
        state.powerups.push({
          id: 'qte_btn',
          name: ch.name,
          color: ch.effect==='qte_correct' ? '#00ff88' : '#ff4444',
          icon: ch.icon,
          effect: ch.effect,
          x: 50 + 50 + idx * 100, // В трех разных полосах
          y: -100 - (Math.random()*50),
          speed: state.speed + 1
        });
      });
      // The Target popup text
      spawnPopup(state.player.x+50, state.player.y-80, "ТРУБА ПРОРВАНА! ИЩИ РЕШЕНИЕ!", "#00aaff");
      state.pipeTargetName = choices.find(c=>c.effect==='qte_correct').name;
    }
  } else if(state.pipeState === 1){
    state.pipeTimeLeft -= dt;
    // Shake slightly while pipe is broken
    if(Math.random() < 0.1) state.shake = 3;
    if(state.pipeTimeLeft <= 0){
        state.pipeState = 0;
        state.shake = 10;
        spawnPopup(state.player.x+50, state.player.y-50, "УПУСТИЛИ ВРЕМЯ!", "#ff4444");
        state.player.speed = 0.5; setTimeout(()=>state.player.speed=1, 2000);
    }
  }

  // Minister
  state.ministerTimer-=dt;
  if(state.ministerTimer<=0){
    state.ministerTimer=30;
    state.ministerMsg=MINISTER_MSGS[Math.floor(Math.random()*MINISTER_MSGS.length)];
    state.ministerVisible=3;
  }
  if(state.ministerVisible>0)state.ministerVisible-=dt;

  // Spawn obstacles - SMOOTH and FASTER
  const spawnRate = 1.5 - (elapsed / GAME_DURATION) * 1.2; // From 1.5s down to 0.3s
  state.spawnTimer+=dt;
  if(state.spawnTimer>=spawnRate){state.spawnTimer=0;spawnObstacle();}

  // Spawn powerups
  state.powerupSpawnTimer-=dt;
  if(state.powerupSpawnTimer<=0){state.powerupSpawnTimer=6+Math.random()*4;spawnPowerup();}

  // Player input
  const p=state.player;
  const moveDir=state.invertControls?-1:1;
  if(state.keys['ArrowLeft']||state.keys['a']||state.keys['A']||state.keys['KeyA']||state.keys['ф']||state.keys['Ф'])p.vx=-6*moveDir;
  else if(state.keys['ArrowRight']||state.keys['d']||state.keys['D']||state.keys['KeyD']||state.keys['в']||state.keys['В'])p.vx=6*moveDir;
  else p.vx*=0.7;

  state.accelMsgCd=(state.accelMsgCd||0)-dt;
  state.decelMsgCd=(state.decelMsgCd||0)-dt;

  if(state.keys['ArrowUp']||state.keys['w']||state.keys['W']||state.keys['KeyW']||state.keys['ц']||state.keys['Ц']){
    p.vy=-6*moveDir;
    if(state.accelMsgCd<=0){spawnPopup(p.x+50,p.y-50,'🚀 Ускоряемся!','#00ff88');state.accelMsgCd=1.5;}
  }
  else if(state.keys['ArrowDown']||state.keys['s']||state.keys['S']||state.keys['KeyS']||state.keys['ы']||state.keys['Ы']){
    p.vy=6*moveDir;
    if(state.decelMsgCd<=0){spawnPopup(p.x+50,p.y-50,'🛑 Замедляемся!','#ff4444');state.decelMsgCd=1.5;}
  }
  else p.vy*=0.7;

  const speedMult=p.activePowerup==='turbo'?2:p.activePowerup==='speed'?1.5:1;
  p.x+=p.vx*p.speed*speedMult;
  p.x=Math.max(28,Math.min(p.x,272));
  p.y+=p.vy*p.speed*speedMult;
  p.y=Math.max(50,Math.min(p.y,550));

  // Player score
  p.score+=state.speed*dt*p.speed;

  // Powerup timer
  if(p.activePowerup){
    p.powerupTimer-=dt;
    if(p.powerupTimer<=0)p.activePowerup=null;
  }

  // Invincible
  if(p.invincible>0)p.invincible-=dt;

  // AI
  updateAI(dt);

  // Move obstacles
  state.obstacles.forEach(o=>{o.y+=o.speed*dt*60;if(o.type==='storm')o.rot=(o.rot||0)+2*dt;});
  state.obstacles=state.obstacles.filter(o=>{
    if(o.y>H+100&&o.lane==='player'&&o.active&&!o.scored){
      o.scored = true;
      p.streak++;
      if(p.streak>1)spawnPopup(p.x+50,p.y-60,`x${p.streak} СЕРИЯ!`,'#00ff88');
    }
    return o.y<H+120;
  });

  // Move powerups
  state.powerups.forEach(pu=>pu.y+=pu.speed*dt*60);
  state.powerups=state.powerups.filter(pu=>pu.y<H+50);

  // Particles
  state.particles.forEach(p2=>{p2.x+=p2.vx*dt*60;p2.y+=p2.vy*dt*60;p2.vy+=0.1;p2.life-=dt*1.5;});
  state.particles=state.particles.filter(p2=>p2.life>0);

  // Popups
  state.popups.forEach(p2=>{p2.y+=p2.vy*dt*60;p2.life-=dt*1.2;});
  state.popups=state.popups.filter(p2=>p2.life>0);

  // Speech bubble timers
  playerBubble.timer -= dt;
  playerBubble.nextIn -= dt;
  if(playerBubble.nextIn <= 0){
    playerBubble.text = PLAYER_PHRASES[Math.floor(Math.random()*PLAYER_PHRASES.length)];
    playerBubble.timer = 2.5;
    playerBubble.nextIn = 3 + Math.random()*4;
  }
  aiBubble.timer -= dt;
  aiBubble.nextIn -= dt;
  if(aiBubble.nextIn <= 0){
    const pool = state.ai.mode==='ГЛЮК'
      ? ['Ошибка 404: совесть','Перезагрузка...','Сбой системы!','ГЛЮК ГЛЮК ГЛЮК']
      : state.ai.mode==='ЧИТЕР'
      ? ['Читаю базу данных!','Доступ разрешён!','Хакую тендер!','Обхожу ФАС!']
      : AI_PHRASES;
    aiBubble.text = pool[Math.floor(Math.random()*pool.length)];
    aiBubble.timer = 2.5;
    aiBubble.nextIn = 2.5 + Math.random()*3;
  }

  checkCollisions();
}

function endGame(){
  state.screen='results';
  stopBGMusic();
  if(state.player.score>state.ai.score)playWin();
  // Save leaderboard
  const date=new Date().toLocaleDateString('ru-RU');
  state.leaderboard.push({score:Math.floor(state.player.score),date});
  state.leaderboard.sort((a,b)=>b.score-a.score);
  state.leaderboard=state.leaderboard.slice(0,10);
  localStorage.setItem('tf_lb',JSON.stringify(state.leaderboard));
}

// ═══ RENDER ═══
function render(){
  ctx.save();
  if(state.shake>0){
    ctx.translate((Math.random()-0.5)*state.shake,(Math.random()-0.5)*state.shake);
  }

  if(state.screen==='title')drawTitle();
  else if(state.screen==='countdown')drawCountdown();
  else if(state.screen==='playing')drawGame();
  else if(state.screen==='pause')drawPause();
  else if(state.screen==='results')drawResults();
  ctx.restore();
}

// ═══ GAME LOOP ═══
function loop(ts){
  const dt=Math.min((ts-state.lastTime)/1000,0.05);
  state.lastTime=ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

// ═══ INPUT ═══
document.addEventListener('keydown',e=>{
  if(AC.state==='suspended')AC.resume();
  state.keys[e.key]=true;
  if(e.code) state.keys[e.code]=true;
  if(e.key==='Escape'){
    if(state.screen==='playing'){state.screen='pause';state.pauseIndex=0;}
    else if(state.screen==='pause'){state.screen='title';stopBGMusic();}
    else if(state.screen==='results')state.screen='title';
  }
  if(state.screen==='pause'){
    if(e.key==='ArrowUp'||e.code==='KeyW'||e.key==='ц'||e.key==='Ц') state.pauseIndex = ((state.pauseIndex||0)-1+3)%3;
    if(e.key==='ArrowDown'||e.code==='KeyS'||e.key==='ы'||e.key==='Ы') state.pauseIndex = ((state.pauseIndex||0)+1)%3;
  }
  if(e.key==='Enter'){
    if(state.screen==='title')resetGame();
    else if(state.screen==='pause'){
      const idx = (state.pauseIndex||0);
      if(idx===0)state.screen='playing';
      else if(idx===1)resetGame();
      else {state.screen='title';stopBGMusic();}
    }
    else if(state.screen==='results')resetGame();
  }
  if((e.key===' '||e.key==='Enter')&&state.screen==='playing'){
    if(state.player.activePowerup==='xray'){spawnPopup(state.player.x+50,state.player.y-60,'👁 ИНСАЙД!','#cc44ff');}
  }
});
document.addEventListener('keyup',e=>{
  state.keys[e.key]=false;
  if(e.code) state.keys[e.code]=false;
});

canvas.addEventListener('click',e=>{
  if(AC.state==='suspended')AC.resume();
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)/rect.width*1066.666;
  const my=(e.clientY-rect.top)/rect.height*600;

  if(state.screen==='title'){
    if(mx>383.33&&mx<683.33&&my>465&&my<520)resetGame();
    if(mx>433.33&&mx<633.33&&my>535&&my<575){
      // Show leaderboard (already in results screen logic)
    }
  }
  if(state.screen==='pause'){
    if(my>230&&my<278)state.screen='playing';
    if(my>300&&my<348)resetGame();
    if(my>370&&my<418){state.screen='title';stopBGMusic();}
  }
  if(state.screen==='results'){
    if(mx>233.33&&mx<473.33&&my>500&&my<550)resetGame();
    if(mx>593.33&&mx<833.33&&my>500&&my<550){
      state.leaderboard=[];localStorage.removeItem('tf_lb');
    }
  }
  // Reset and Menu buttons during playing
  if(state.screen==='playing'){


    if(mx>956.66&&mx<1056.66&&my>65&&my<97)resetGame();
    if(mx>956.66&&mx<1056.66&&my>102&&my<134){state.screen='title';stopBGMusic();}
  }
});

// Touch
canvas.addEventListener('touchstart',e=>{
  if(AC.state==='suspended')AC.resume();
  state.touchStartX=e.touches[0].clientX;
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  const dx=e.touches[0].clientX-state.touchStartX;
  if(Math.abs(dx)>10){state.keys[dx<0?'ArrowLeft':'ArrowRight']=true;state.keys[dx<0?'ArrowRight':'ArrowLeft']=false;}
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend',e=>{
  state.keys['ArrowLeft']=false;state.keys['ArrowRight']=false;
  e.preventDefault();
},{passive:false});

requestAnimationFrame(loop);
